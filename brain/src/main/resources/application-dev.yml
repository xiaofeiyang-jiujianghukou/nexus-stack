spring:
  redis:
    host: 127.0.0.1
    port: 6379
    password: xfy@930112
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 2
        max-wait: -1ms

# 自定义数据源配置（注意这里不是 spring.datasource，避免触发自动配置）
app:
  datasource:
    mysql:
      # 建议加上时区和SSL配置，避免 8.0 常见的连接失败
      jdbc-url: jdbc:mysql://127.0.0.1:33306/brain_db?useSSL=false&connectionTimeZone=UTC&allowPublicKeyRetrieval=true&defaultAuthenticationPlugin=caching_sha2_password
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver
      hostname: 127.0.0.1
      port: 33306
    clickhouse:
      jdbc-url: jdbc:clickhouse://127.0.0.1:38123/default
      username: default
      password: 123456
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver

kafka:
  bootstrap-servers: localhost:39092

flink:
  rest:
    address: localhost:3081

# 日志配置 (可选)
logging:
  level:
    com.truejarvis: DEBUG
    com.baomidou.mybatisplus: DEBUG

springdoc:
  # API 文档路径 (默认 /v3/api-docs)
  api-docs:
    path: /v3/api-docs
  # Swagger UI 路径 (默认 /swagger-ui.html -> 重定向到 /swagger-ui/index.html)
  swagger-ui:
    path: /swagger-ui.html
    enabled: true # 开发环境开启
    operations-sorter: alpha # 按字母顺序排序接口
    tags-sorter: alpha
    # 尝试将 Swagger UI 请求映射到后端 API (解决部分网关代理问题)
    url: /v3/api-docs

  # 分组显示 (可选，用于区分不同模块)
  group-configs:
    - group: "core-api"
      paths-to-match: "/**"
      packages-to-scan: "com.nexus.stack.brain.controller"


llm:
  model:
    name: deepseek-chat
    apiKey: sk-xxxxxxxxxxxxxxxxxxxxxxx
    baseUrl: https://api.deepseek.com/chat/completions