#version: '3.8'

services:

  # ========================
  # 后端服务
  # ========================
  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: nexus-stack-brain
    networks:
      - nexus-stack-net
    ports:
      - "38080:8080"
    # 👇 修正后的写法：策略和次数分开
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 5
    depends_on:
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      mysql: { condition: service_healthy }
      #kafka: { condition: service_healthy }
    cpus: 0.3      # 限制 0.3 核
    mem_limit: 768m  # 限制 768MB 内存
    environment:
      # JVM 网络
      JAVA_TOOL_OPTIONS: >
        -Djava.net.preferIPv4Stack=true
        -Djava.net.useSystemProxies=false
        -Dhttp.nonProxyHosts="localhost|127.0.0.1|mysql|redis|clickhouse|kafka|zookeeper"

      # Spring Profile
      SPRING_PROFILES_ACTIVE: pro

      # ========================
      # MySQL（关键）
      # ========================
      APP_DATASOURCE_MYSQL_URL: jdbc:mysql://nexus-stack-mysql:3306/brain_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&defaultAuthenticationPlugin=caching_sha2_password&connectTimeout=30000
      APP_DATASOURCE_MYSQL_USERNAME: root
      APP_DATASOURCE_MYSQL_PASSWORD: 123456

      # ========================
      # ClickHouse
      # ========================
      APP_DATASOURCE_CLICKHOUSE_URL: jdbc:clickhouse://nexus-stack-clickhouse:8123/default
      APP_DATASOURCE_CLICKHOUSE_USERNAME: default
      APP_DATASOURCE_CLICKHOUSE_PASSWORD: 123456

      # ========================
      # Redis
      # ========================
      SPRING_REDIS_HOST: nexus-stack-redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: 123456

      # ========================
      # Kafka
      # ========================
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # ========================
      # Flink
      # ========================
      FLINK_SQL_GATEWAY_ADDRESS: flink-jobmanager:28081

  # ========================
  # 前端
  # ========================
  brain-view:
    build:
      context: ./brain-view
      dockerfile: Dockerfile
    container_name: nexus-stack-brain-view
    networks:
      - nexus-stack-net
    ports:
      - "33000:80"
    depends_on:
      - brain
    cpus: 0.1
    mem_limit: 128m

  # ========================
  # MySQL
  # ========================
  mysql:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/mysql:8.0
    user: "999:999"  # MySQL 容器内用户
    container_name: nexus-stack-mysql
    networks:
      - nexus-stack-net
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: brain_db
    ports:
      - "33306:3306"
    volumes:
      - ./data/mysql/data:/var/lib/mysql
      - ./init/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --bind-address=0.0.0.0
      - --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s # 给 MySQL 30秒的启动缓冲期，这期间不算失败
    cpus: 0.5      # MySQL 分配 0.5 核
    mem_limit: 512m

  # ========================
  # Redis
  # ========================
  redis:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/redis:7
    container_name: nexus-stack-redis
    networks:
      - nexus-stack-net
    restart: always
    ports:
      - "36379:6379"
    command: >
      redis-server 
      --requirepass 123456 
      --appendonly yes
      --appendfsync everysec
    volumes:
      - ./data/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 10s
      retries: 5
    cpus: 0.2
    mem_limit: 256m

