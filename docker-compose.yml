  #      interval: 10s
  #      retries: 5

  # ========================
  # ClickHouse
  # ========================
  clickhouse:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/clickhouse-server:23
    user: "101:101"  # ClickHouse 容器内用户
    container_name: nexus-stack-clickhouse
    networks:
      - nexus-stack-net
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: 123456
      CLICKHOUSE_MAX_MEMORY_USAGE: 1073741824
    ports:
      - "38123:8123"
      - "39000:9000"
    volumes:
      - ./data/clickhouse/data:/var/lib/clickhouse
      #- ./data/clickhouse/logs:/var/log/clickhouse-server
      - ./init/clickhouse/init:/docker-entrypoint-initdb.d/
      - ./config/clickhouse/config.d:/etc/clickhouse-server/config.d
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      retries: 5
    logging: *default-logging

  # ========================
  # Flink JobManager
  # ========================
  flink-jobmanager:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/flink:1.18-java17-nexus
    container_name: nexus-stack-jobmanager
    networks:
      - nexus-stack-net
    command: jobmanager
    ports:
      - "38081:8081"
      - "36123:6123"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - JVM_ARGS=-Xms256m -Xmx512m
      - |-
        FLINK_PROPERTIES=
        rest.bind-address: 0.0.0.0
        rest.bind-port: 8081
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        state.checkpoints.num-retained: 3  # 只保留最近3个检查点
        state.checkpoints.cleaner.interval: 3600000  # 每小时清理
    # 添加健康检查
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/overview" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    logging: *default-logging

  # ========================
  # Flink TaskManager
  # ========================
  flink-taskmanager:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/flink:1.18-java17-nexus
    container_name: nexus-stack-taskmanager
    networks:
      - nexus-stack-net
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - JVM_ARGS=-Xms512m -Xmx768m
      - |-
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        # 添加这些配置
        state.checkpoints.num-retained: 3  # 只保留最近3个检查点
        state.checkpoints.cleaner.interval: 3600000  # 每小时清理一次
        state.backend: hashmap
        taskmanager.memory.process.size: 1024m  # 限制内存
    logging: *default-logging

  # ========================
  # Flink SQL Gateway
  # ========================
  flink-sql-gateway:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/flink:1.18-java17-nexus
    container_name: nexus-stack-sql-gateway
    networks:
      - nexus-stack-net
    depends_on:
      - flink-jobmanager
    ports:
      - "38083:8083"
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - JVM_ARGS=-Xms128m -Xmx192m
      - |-
        FLINK_PROPERTIES=
        rest.bind-address: 0.0.0.0
        jobmanager.rpc.address: flink-jobmanager
        state.checkpoints.dir: file:///opt/flink/checkpoints
    command: >
      /opt/flink/bin/sql-gateway.sh start-foreground
      -Dsql-gateway.endpoint.rest.address=0.0.0.0
      -Dsql-gateway.endpoint.rest.port=8083
      -Djobmanager.rpc.address=flink-jobmanager
    # 添加健康检查
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/v1/info" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    logging: *default-logging

networks:
  nexus-stack-net:
    driver: bridge