#version: '3.8'

services:

  # 定义日志模板
  x-logging: &default-logging
    driver: "json-file"
    options:
      max-size: "10m"      # 单个日志文件最大10MB
      max-file: "3"        # 保留3个文件
      compress: "true"     # 压缩旧日志

  # ========================
  # 后端服务
  # ========================
  brain:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: nexus-stack-brain
    networks:
      - nexus-stack-net
    ports:
      - "38080:8080"
    restart: on-failure
    depends_on:
      redis: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      mysql: { condition: service_healthy }
      flink-jobmanager: { condition: service_healthy }
      flink-sql-gateway: { condition: service_healthy }
      #kafka: { condition: service_healthy }
    environment:
      # JVM 内存优化
      JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      JAVA_TOOL_OPTIONS: >
        -Djava.net.preferIPv4Stack=true
        -Djava.net.useSystemProxies=false
        -Dhttp.nonProxyHosts="localhost|127.0.0.1|mysql|redis|clickhouse|kafka|zookeeper"

      # Spring Profile
      SPRING_PROFILES_ACTIVE: pro

      # ========================
      # MySQL（关键）
      # ========================
      APP_DATASOURCE_MYSQL_URL: jdbc:mysql://mysql:3306/brain_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=30000
      APP_DATASOURCE_MYSQL_USERNAME: root
      APP_DATASOURCE_MYSQL_PASSWORD: 123456

      # ========================
      # ClickHouse
      # ========================
      APP_DATASOURCE_CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/default
      APP_DATASOURCE_CLICKHOUSE_USERNAME: default
      APP_DATASOURCE_CLICKHOUSE_PASSWORD: 123456

      # ========================
      # Redis
      # ========================
      SPRING_REDIS_HOST: nexus-stack-redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: 123456

      # ========================
      # Kafka
      # ========================
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # ========================
      # Flink
      # ========================
      FLINK_REST_URL: http://flink-jobmanager:8081
      FLINK_SQL_GATEWAY_URL: http://flink-sql-gateway:8083
    logging: *default-logging

  # ========================
  # 前端
  # ========================
  brain-view:
    build:
      context: ./brain-view
      dockerfile: Dockerfile
    container_name: nexus-stack-brain-view
    networks:
      - nexus-stack-net
    ports:
      - "33000:80"
    depends_on:
      - brain
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================
  # MySQL
  # ========================
  mysql:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/mysql:8.0
    user: "999:999"  # MySQL 容器内用户
    container_name: nexus-stack-mysql
    networks:
      - nexus-stack-net
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: brain_db
    ports:
      - "33306:3306"
    volumes:
      - ./data/mysql/data:/var/lib/mysql
      - ./init/mysql/init:/docker-entrypoint-initdb.d
      - ./mysql-conf:/etc/mysql/conf.d
    command:
      - --bind-address=0.0.0.0
      - --default-authentication-plugin=caching_sha2_password
      - --innodb-buffer-pool-size=256M
      - --innodb-log-file-size=64M
      - --max-connections=100
      - --innodb-temp-data-file-path=ibtmp1:12M:autoextend:max:256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ========================
  # Redis
  # ========================
  redis:
    image: crpi-27zlqugq2208c0pz.cn-hangzhou.personal.cr.aliyuncs.com/xiaofeiyang930112/redis:7
    container_name: nexus-stack-redis
    networks:
      - nexus-stack-net
    restart: always
    ports:
      - "36379:6379"
    command: >
      redis-server 
      --requirepass 123456 
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 123456 ping | grep PONG"]
      interval: 10s
      retries: 5
    logging: *default-logging

